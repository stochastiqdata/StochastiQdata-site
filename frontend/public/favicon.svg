<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#22d3ee"/>
      <stop offset="50%"  stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
    <linearGradient id="b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a21caf"/>
    </linearGradient>
  </defs>

  <!-- fond sombre arrondi -->
  <rect width="64" height="64" rx="12" fill="#0d1526"/>

  <!-- face supérieure -->
  <polygon points="32,8 52,20 32,32 12,20" fill="url(#a)" opacity="0.95"/>
  <!-- face gauche -->
  <polygon points="12,20 32,32 32,52 12,40" fill="url(#b)" opacity="0.9"/>
  <!-- face droite -->
  <polygon points="52,20 32,32 32,52 52,40" fill="url(#c)" opacity="0.9"/>

  <!-- arêtes -->
  <polyline points="32,8 12,20 12,40 32,52 52,40 52,20 32,8" fill="none" stroke="#c7d2fe" stroke-width="1.2" stroke-linejoin="round"/>
  <line x1="32" y1="8"  x2="32" y2="32" stroke="#c7d2fe" stroke-width="1.2"/>
  <line x1="12" y1="20" x2="32" y2="32" stroke="#c7d2fe" stroke-width="1.2"/>
  <line x1="52" y1="20" x2="32" y2="32" stroke="#c7d2fe" stroke-width="1.2"/>
  <line x1="32" y1="32" x2="32" y2="52" stroke="#c7d2fe" stroke-width="1.2"/>
</svg>
